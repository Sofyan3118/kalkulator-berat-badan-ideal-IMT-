<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Kalkulator Berat Badan Ideal</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --accent: #3b82f6;
      --muted: #6b7280;
      --glass: rgba(255,255,255,0.7);
      font-family: system-ui, -apple-system, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      background: linear-gradient(180deg, var(--bg), #eef2ff);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .container {
      max-width: 900px;
      width: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 25px;
      align-items: start;
    }
    
    /* MOBILE: Single column */
    @media (max-width: 768px) {
      .container {
        grid-template-columns: 1fr;
        gap: 20px;
      }
    }
    
    .form-card, .result-card {
      background: var(--glass);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 16px;
      padding: 30px;
    }
    
    h1 {
      font-size: 24px;
      color: #1f2937;
      margin-bottom: 10px;
    }
    
    .lead {
      color: var(--muted);
      font-size: 15px;
      margin-bottom: 25px;
    }
    
    .input-group {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    
    label {
      font-size: 14px;
      color: #374151;
      font-weight: 500;
      margin-bottom: 6px;
      display: block;
    }
    
    input {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #e5e7eb;
      border-radius: 10px;
      font-size: 16px;
      transition: all 0.2s;
    }
    
    input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
    }
    
    .btn-group {
      display: flex;
      gap: 12px;
      margin-top: 25px;
    }
    
    button {
      flex: 1;
      padding: 14px 20px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .btn-primary {
      background: var(--accent);
      color: white;
    }
    
    .btn-primary:hover {
      background: #2563eb;
      transform: translateY(-1px);
    }
    
    .btn-secondary {
      background: rgba(255,255,255,0.5);
      color: var(--accent);
      border: 2px solid rgba(59,130,246,0.2);
    }
    
    .btn-secondary:hover {
      background: rgba(255,255,255,0.7);
    }
    
    .result-main {
      display: flex;
      gap: 20px;
      align-items: center;
      margin-bottom: 20px;
    }
    
    .bmi-display {
      flex: 1;
    }
    
    .bmi-label {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 5px;
    }
    
    .bmi-value {
      font-size: 42px;
      font-weight: 800;
      color: var(--accent);
      margin-bottom: 8px;
    }
    
    .bmi-category {
      font-size: 16px;
      font-weight: 600;
      color: #1f2937;
    }
    
    .ideal-display {
      text-align: right;
    }
    
    .ideal-label {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 5px;
    }
    
    .ideal-value {
      font-size: 20px;
      font-weight: 700;
      color: #059669;
    }
    
    .scale {
      display: flex;
      gap: 6px;
      height: 10px;
      border-radius: 6px;
      background: rgba(236,238,252,0.8);
      margin: 20px 0;
      overflow: hidden;
    }
    
    .scale div {
      border-radius: 4px;
      transition: all 0.3s ease;
    }
    
    .scale-thin { background: #fef3c7; flex: 1; }
    .scale-normal { background: #bbf7d0; flex: 2; }
    .scale-fat { background: #fed7d7; flex: 1.5; }
    
    .note {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
      background: rgba(255,255,255,0.5);
      padding: 15px;
      border-radius: 10px;
      border-left: 4px solid var(--accent);
    }
    
    @media (max-width: 768px) {
      .result-main {
        flex-direction: column;
        gap: 15px;
        text-align: center;
      }
      .ideal-display {
        text-align: center;
      }
      .btn-group {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- FORM -->
    <div class="form-card">
      <h1>Kalkulator BMI</h1>
      <p class="lead">Masukkan berat dan tinggi badan</p>
      
      <div class="input-group">
        <div>
          <label>Berat (kg)</label>
          <input type="number" id="weight" placeholder="60" step="0.1" min="0">
        </div>
        
        <div>
          <label>Tinggi (cm)</label>
          <input type="number" id="height" placeholder="170" step="0.1" min="0">
        </div>
      </div>
      
      <div class="btn-group">
        <button class="btn-primary" onclick="calculate()">Hitung BMI</button>
        <button class="btn-secondary" onclick="resetForm()">Reset</button>
      </div>
      
      <div class="note">
        📊 BMI = berat(kg) / [tinggi(m)]²<br>
        Normal: 18.5 - 24.9
      </div>
    </div>
    
    <!-- RESULT -->
    <div class="result-card" id="resultCard" style="display:none;">
      <div class="result-main">
        <div class="bmi-display">
          <div class="bmi-label">Nilai BMI</div>
          <div class="bmi-value" id="bmiValue">--</div>
          <div class="bmi-category" id="bmiCategory">--</div>
        </div>
        <div class="ideal-display">
          <div class="ideal-label">Berat Ideal</div>
          <div class="ideal-value" id="idealRange">-- kg</div>
          <div style="font-size:12px;color:var(--muted);">(18.5-24.9)</div>
        </div>
      </div>
      
      <div class="scale" id="scale">
        <div class="scale-thin"></div>
        <div class="scale-normal"></div>
        <div class="scale-fat"></div>
      </div>
    </div>
  </div>

  <script>
    function calculate() {
      const weight = parseFloat(document.getElementById('weight').value);
      const height = parseFloat(document.getElementById('height').value);
      
      if (!weight || !height || weight <= 0 || height <= 0) {
        alert('Masukkan data yang valid!');
        return;
      }
      
      const heightM = height / 100;
      const bmi = Math.round((weight / (heightM * heightM)) * 10) / 10;
      
      // Update BMI
      document.getElementById('bmiValue').textContent = bmi;
      
      // Kategori & scale
      let category, thin=1, normal=2, fat=1.5;
      if (bmi < 18.5) {
        category = 'KURUS';
        thin = 3; normal = 1; fat = 1;
      } else if (bmi < 25) {
        category = 'NORMAL';
        thin = 1; normal = 3; fat = 1;
      } else {
        category = 'GEMUK';
        thin = 1; normal = 1; fat = 3;
      }
      
      document.getElementById('bmiCategory').textContent = category;
      
      // Berat ideal
      const minIdeal = Math.round(18.5 * heightM * heightM * 10) / 10;
      const maxIdeal = Math.round(24.9 * heightM * heightM * 10) / 10;
      document.getElementById('idealRange').textContent = `${minIdeal}-${maxIdeal}`;
      
      // Update scale
      document.querySelector('.scale-thin').style.flex = thin;
      document.querySelector('.scale-normal').style.flex = normal;
      document.querySelector('.scale-fat').style.flex = fat;
      
      // Show result
      document.getElementById('resultCard').style.display = 'block';
    }
    
    function resetForm() {
      document.getElementById('weight').value = '';
      document.getElementById('height').value = '';
      document.getElementById('resultCard').style.display = 'none';
    }
  </script>
</body>
</html>
