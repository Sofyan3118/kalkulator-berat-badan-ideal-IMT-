<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Kalkulator BMI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .calc {
      background: white;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.1);
      max-width: 450px;
      width: 100%;
      text-align: center;
    }
    h1 { 
      color: #333; 
      margin-bottom: 10px; 
      font-size: 24px;
    }
    .subtitle {
      color: #666;
      margin-bottom: 30px;
      font-size: 16px;
    }
    .input-group {
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin-bottom: 25px;
    }
    .input-row {
      display: flex;
      gap: 20px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      color: #555;
      font-weight: 500;
      font-size: 14px;
    }
    input {
      flex: 1;
      padding: 15px;
      border: 2px solid #e1e5e9;
      border-radius: 12px;
      font-size: 18px;
      transition: border-color 0.3s;
    }
    input:focus {
      outline: none;
      border-color: #667eea;
    }
    .buttons {
      display: flex;
      gap: 12px;
      margin-bottom: 25px;
    }
    button {
      flex: 1;
      padding: 15px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }
    .btn-calc {
      background: #667eea;
      color: white;
    }
    .btn-calc:hover { background: #5a67d8; transform: translateY(-2px); }
    .btn-reset {
      background: #f7fafc;
      color: #4a5568;
      border: 2px solid #e2e8f0;
    }
    .btn-reset:hover { background: #edf2f7; }
    .result {
      background: linear-gradient(135deg, #f7fafc 0%, #edf2f7 100%);
      padding: 25px;
      border-radius: 16px;
      margin-top: 20px;
    }
    .bmi-value {
      font-size: 48px;
      font-weight: 800;
      margin: 10px 0;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .bmi-category {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 15px;
    }
    .ideal-weight {
      font-size: 18px;
      color: #38a169;
      font-weight: 600;
    }
    .scale {
      display: flex;
      height: 12px;
      border-radius: 6px;
      overflow: hidden;
      margin: 20px 0;
      background: #e2e8f0;
    }
    .scale div {
      height: 100%;
    }
    .scale .kurus { background: #fed7aa; flex: 1; }
    .scale .normal { background: #9ae6b4; flex: 2; }
    .scale .gemuk { background: #feb2b2; flex: 1.5; }
    .note {
      font-size: 14px;
      color: #718096;
      margin-top: 15px;
      line-height: 1.5;
    }
    
    /* Mobile: Input stack vertically */
    @media (max-width: 500px) {
      .input-row { flex-direction: column; gap: 20px; }
      .buttons { flex-direction: column; }
      .calc { padding: 25px 20px; }
      h1 { font-size: 22px; }
    }
  </style>
</head>
<body>
  <div class="calc">
    <h1>Kalkulator BMI</h1>
    <p class="subtitle">Hitung IMT dan berat ideal Anda</p>
    
    <div class="input-group">
      <div>
        <label>Berat (kg)</label>
        <input type="number" id="weight" placeholder="60" step="0.1" min="0">
      </div>
      
      <div class="input-group">
        <div>
          <label>Tinggi (cm)</label>
          <input type="number" id="height" placeholder="170" step="0.1" min="0">
        </div>
      </div>
    </div>
    
    <div class="buttons">
      <button class="btn-calc" onclick="hitungBMI()">Hitung</button>
      <button class="btn-reset" onclick="resetForm()">Reset</button>
    </div>
    
    <div class="result" id="result" style="display:none;">
      <div class="bmi-value" id="bmiValue">--</div>
      <div class="bmi-category" id="bmiCategory">--</div>
      <div class="ideal-weight" id="idealWeight">-- kg</div>
      
      <div class="scale">
        <div class="kurus"></div>
        <div class="normal"></div>
        <div class="gemuk"></div>
      </div>
      
      <div class="note">
        📊 <strong>Kurus:</strong> &lt;18.5 | <strong>Normal:</strong> 18.5-24.9 | 
        <strong>Gemuk:</strong> ≥25
      </div>
    </div>
  </div>

  <script>
    function hitungBMI() {
      const weight = parseFloat(document.getElementById('weight').value);
      const height = parseFloat(document.getElementById('height').value);
      
      if (!weight || !height || weight <= 0 || height <= 0) {
        alert('Masukkan berat dan tinggi yang valid!');
        return;
      }
      
      const heightM = height / 100;
      const bmi = Math.round((weight / (heightM * heightM)) * 10) / 10;
      
      document.getElementById('bmiValue').textContent = bmi;
      
      let kategori;
      if (bmi < 18.5) {
        kategori = 'Kurus';
        document.querySelector('.scale .kurus').style.flex = '3';
        document.querySelector('.scale .normal').style.flex = '1';
        document.querySelector('.scale .gemuk').style.flex = '1';
      } else if (bmi < 25) {
        kategori = 'Normal';
        document.querySelector('.scale .kurus').style.flex = '1';
        document.querySelector('.scale .normal').style.flex = '3';
        document.querySelector('.scale .gemuk').style.flex = '1';
      } else {
        kategori = 'Gemuk';
        document.querySelector('.scale .kurus').style.flex = '1';
        document.querySelector('.scale .normal').style.flex = '1';
        document.querySelector('.scale .gemuk').style.flex = '3';
      }
      
      document.getElementById('bmiCategory').textContent = kategori;
      
      const minIdeal = Math.round(18.5 * heightM * heightM * 10) / 10;
      const maxIdeal = Math.round(24.9 * heightM * heightM * 10) / 10;
      document.getElementById('idealWeight').textContent = `${minIdeal}-${maxIdeal}`;
      
      document.getElementById('result').style.display = 'block';
    }
    
    function resetForm() {
      document.getElementById('weight').value = '';
      document.getElementById('height').value = '';
      document.getElementById('result').style.display = 'none';
      
      // Reset scale
      document.querySelector('.scale .kurus').style.flex = '1';
      document.querySelector('.scale .normal').style.flex = '2';
      document.querySelector('.scale .gemuk').style.flex = '1.5';
    }
    
    // Enter key
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') hitungBMI();
    });
  </script>
</body>
</html>
